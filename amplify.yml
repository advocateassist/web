version: 1
applications:
  - appRoot: artifacts/advocate-assist
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - corepack enable
            - pnpm install
        build:
          commands:
            - pnpm --filter @workspace/advocate-assist run build
            - mkdir -p artifacts/advocate-assist/node_modules && cp -rL node_modules/next artifacts/advocate-assist/node_modules/next
      artifacts:
        baseDirectory: artifacts/advocate-assist/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - artifacts/advocate-assist/.next/cache/**/*
