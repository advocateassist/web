version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - pnpm install
        - cd artifacts/advocate-assist && pnpm install --prefer-offline
    build:
      commands:
        - pnpm --filter @workspace/advocate-assist run build
  artifacts:
    baseDirectory: artifacts/advocate-assist/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - artifacts/advocate-assist/node_modules/**/*
      - artifacts/advocate-assist/.next/cache/**/*
